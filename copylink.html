<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复制链接 | 秋天霹雳</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/site.css">
  <style>
    .copy-page {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(211, 107, 75, 0.22), rgba(226, 189, 104, 0.2)),
        var(--bg);
    }

    .copy-box {
      width: min(680px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .copy-target {
      width: 100%;
      margin: 20px 0;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--surface-strong);
      font: inherit;
    }

    .copy-status {
      min-height: 28px;
      margin-top: 14px;
      color: var(--primary-strong);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="copy-page">
    <section class="copy-box">
      <p class="eyebrow">Copy</p>
      <h1>复制分享链接</h1>
      <p class="hero-text">默认链接指向新版主页，也可以在输入框里改成要分享的内容。</p>
      <input class="copy-target" id="copyTarget" value="https://20610728.xyz/" aria-label="要复制的链接">
      <div class="hero-actions center">
        <button class="button primary" type="button" id="copyButton">复制</button>
        <a class="button secondary" href="index.html">回到首页</a>
      </div>
      <p class="copy-status" id="copyStatus" role="status" aria-live="polite"></p>
    </section>
  </main>
  <script>
    const input = document.getElementById("copyTarget");
    const button = document.getElementById("copyButton");
    const status = document.getElementById("copyStatus");

    async function copyText() {
      const text = input.value.trim();
      if (!text) {
        status.textContent = "请先输入要复制的内容。";
        return;
      }

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          input.select();
          document.execCommand("copy");
        }
        status.textContent = "已复制到剪贴板。";
      } catch (error) {
        status.textContent = "复制失败，请手动选择文本复制。";
      }
    }

    button.addEventListener("click", copyText);
  </script>
</body>
</html>
