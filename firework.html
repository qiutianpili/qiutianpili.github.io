<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>烟花 | 秋天霹雳</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: #f7fbff;
      background: #080d14;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .toolbar {
      position: fixed;
      inset: 18px 18px auto auto;
      display: flex;
      gap: 10px;
      z-index: 2;
    }

    .toolbar a,
    .toolbar button {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      color: #f7fbff;
      background: rgba(14, 21, 32, 0.72);
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      color: rgba(247, 251, 255, 0.78);
      background: rgba(14, 21, 32, 0.64);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body>
  <canvas id="fireworks"></canvas>
  <div class="toolbar">
    <a href="index.html">首页</a>
    <button type="button" id="burst">绽放</button>
  </div>
  <p class="hint">点击屏幕任意位置发射烟花。</p>

  <script>
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");
    const rockets = [];
    const particles = [];
    const colors = ["#7dd3bc", "#f09a73", "#8ebbe7", "#e2bd68", "#ff7aa2"];

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function launch(x = random(80, window.innerWidth - 80), y = random(90, window.innerHeight * 0.55)) {
      rockets.push({
        x: window.innerWidth / 2,
        y: window.innerHeight + 20,
        targetX: x,
        targetY: y,
        speed: random(0.025, 0.04),
        progress: 0,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }

    function explode(x, y, color) {
      const count = Math.floor(random(60, 105));
      for (let i = 0; i < count; i += 1) {
        const angle = (Math.PI * 2 * i) / count;
        const velocity = random(2.2, 6.2);
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * velocity,
          vy: Math.sin(angle) * velocity,
          life: 1,
          decay: random(0.012, 0.024),
          color
        });
      }
    }

    function drawRocket(rocket) {
      rocket.progress += rocket.speed;
      const ease = 1 - Math.pow(1 - rocket.progress, 3);
      const x = rocket.x + (rocket.targetX - rocket.x) * ease;
      const y = rocket.y + (rocket.targetY - rocket.y) * ease;

      ctx.beginPath();
      ctx.arc(x, y, 2.4, 0, Math.PI * 2);
      ctx.fillStyle = rocket.color;
      ctx.shadowBlur = 18;
      ctx.shadowColor = rocket.color;
      ctx.fill();

      if (rocket.progress >= 1) {
        explode(rocket.targetX, rocket.targetY, rocket.color);
        return true;
      }
      return false;
    }

    function drawParticle(particle) {
      particle.vx *= 0.988;
      particle.vy = particle.vy * 0.988 + 0.045;
      particle.x += particle.vx;
      particle.y += particle.vy;
      particle.life -= particle.decay;

      ctx.globalAlpha = Math.max(particle.life, 0);
      ctx.beginPath();
      ctx.arc(particle.x, particle.y, 2.1, 0, Math.PI * 2);
      ctx.fillStyle = particle.color;
      ctx.shadowBlur = 16;
      ctx.shadowColor = particle.color;
      ctx.fill();
      ctx.globalAlpha = 1;

      return particle.life <= 0;
    }

    function tick() {
      ctx.fillStyle = "rgba(8, 13, 20, 0.22)";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      for (let i = rockets.length - 1; i >= 0; i -= 1) {
        if (drawRocket(rockets[i])) rockets.splice(i, 1);
      }
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        if (drawParticle(particles[i])) particles.splice(i, 1);
      }

      if (Math.random() > 0.985) launch();
      requestAnimationFrame(tick);
    }

    window.addEventListener("resize", resize);
    canvas.addEventListener("pointerdown", (event) => launch(event.clientX, event.clientY));
    document.getElementById("burst").addEventListener("click", () => launch());

    resize();
    launch();
    tick();
  </script>
</body>
</html>
