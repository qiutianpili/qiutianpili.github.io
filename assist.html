<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="秋天霹雳的资源与帮助中心。">
  <title>资源中心 | 秋天霹雳</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header" data-elevate>
      <a class="brand" href="index.html">
        <span class="brand-mark">Q</span>
        <span><strong>秋天霹雳</strong><small>Resources</small></span>
      </a>
      <nav class="nav-links" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="posts.html">文章</a>
        <a href="friends.html">友链</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="切换深浅色" data-theme-toggle>
        <span aria-hidden="true">日/夜</span>
      </button>
    </header>

    <main class="content-page">
      <section class="page-title">
        <p class="eyebrow">Resources</p>
        <h1>资源中心</h1>
        <p>把原先散落在页面里的常用软件、站点和说明集中起来，后续新增内容只需要复制一张卡片。</p>
      </section>

      <section class="resource-grid" aria-label="常用资源">
        <article class="resource-card">
          <img src="Images/v2ray.png" alt="v2rayNG 图标" loading="lazy">
          <div>
            <p class="tag">代理工具</p>
            <h2>v2rayN / v2rayNG</h2>
            <p>Windows 与 Android 常用客户端。</p>
            <div class="inline-links">
              <a href="https://github.com/2dust/v2rayN/releases" target="_blank" rel="noopener noreferrer">Windows</a>
              <a href="https://github.com/2dust/v2rayNG/releases" target="_blank" rel="noopener noreferrer">Android</a>
            </div>
          </div>
        </article>

        <article class="resource-card">
          <img src="Images/Neko.png" alt="NekoBox 图标" loading="lazy">
          <div>
            <p class="tag">代理工具</p>
            <h2>NekoBox</h2>
            <p>跨平台代理客户端，适合作为备用方案。</p>
            <div class="inline-links">
              <a href="https://github.com/MatsuriDayo/NekoBoxForAndroid/releases" target="_blank" rel="noopener noreferrer">Android</a>
            </div>
          </div>
        </article>

        <article class="resource-card">
          <img src="Images/7ziplogo.png" alt="7-Zip 图标" loading="lazy">
          <div>
            <p class="tag">效率工具</p>
            <h2>7-Zip</h2>
            <p>轻量压缩解压工具。</p>
            <div class="inline-links">
              <a href="https://www.7-zip.org/" target="_blank" rel="noopener noreferrer">官网</a>
            </div>
          </div>
        </article>

        <article class="resource-card">
          <img src="Images/snipastelogo.svg" alt="Snipaste 图标" loading="lazy">
          <div>
            <p class="tag">效率工具</p>
            <h2>Snipaste</h2>
            <p>截图、贴图和标注工具。</p>
            <div class="inline-links">
              <a href="https://www.snipaste.com/" target="_blank" rel="noopener noreferrer">官网</a>
            </div>
          </div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026 秋天霹雳</span>
      <a href="index.html">首页</a>
    </footer>
  </div>
  <script src="assets/site.js" defer></script>
</body>
</html>
